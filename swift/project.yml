name: OCRApp
options:
  bundleIdPrefix: com.ocrapp
  deploymentTarget:
    MacOSX: "11.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    PRODUCT_NAME: OCR App
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "11.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    DEVELOPMENT_TEAM: ""

targets:
  OCRApp:
    type: application
    platform: MacOSX
    sources:
      - path: OCRApp
        excludes:
          - "*.xcodeproj"
          - "*.xcworkspace"
    settings:
      base:
        INFOPLIST_FILE: OCRApp/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.ocrapp.macos
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: OCRApp/Info.plist
      properties:
        CFBundleName: OCR App
        CFBundleDisplayName: OCR App
        CFBundleIdentifier: com.ocrapp.macos
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        CFBundlePackageType: APPL
        CFBundleExecutable: OCRApp
        NSPrincipalClass: NSApplication
        NSHumanReadableCopyright: "Copyright © 2024. All rights reserved."
        LSMinimumSystemVersion: "11.0"
